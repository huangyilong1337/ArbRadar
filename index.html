<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | LOF 极速套利雷达</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 1.1rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: #161b22;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 0.8rem;
    }
    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn.active {
      background: #238636;
      color: #fff;
      border-color: #2ea043;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.82rem;
    }
    th, td {
      padding: 10px 10px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } /* 高溢价红 */
    .rate-down { color: #3fb950; font-weight: bold; } /* 折价绿 */
    
    .tag-limit {
      display: inline-block;
      padding: 2px 5px;
      font-size: 0.7rem;
      border-radius: 4px;
      background: #388bfd15;
      color: #58a6ff;
      border: 1px solid #388bfd30;
    }
    .notice-link {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.75rem;
    }
    .notice-link:hover { color: #58a6ff; text-decoration: underline; }
    .loading-text { text-align: center; padding: 25px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ ArbRadar v0.3 (极速版)</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span></div>
  </div>

  <div class="controls">
    <span>排序方式：</span>
    <button class="btn active" id="sort-premium" onclick="setSort('premium')">🔥 溢价率排序</button>
    <button class="btn" id="sort-volume" onclick="setSort('volume')">💰 成交额排序</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>估算溢价率</th>
          <th>成交额 (人民币)</th>
          <th>申购状态</th>
          <th>公告查询</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="6" class="loading-text">⚡ 正在秒级拉取全市场 LOF 行情...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let currentSort = 'premium';
    let rawLOFData = [];

    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById('sort-premium').className = type === 'premium' ? 'btn active' : 'btn';
      document.getElementById('sort-volume').className = type === 'volume' ? 'btn active' : 'btn';
      renderTable();
    }

    // 带 3 秒强制超时的请求机制，防止任何卡死
    function fetchWithTimeout(url, timeout = 3000) {
      return Promise.race([
        fetch(url).then(res => res.json()),
        new Promise((_, reject) => setTimeout(() => reject(new Error('请求超时')), timeout))
      ]);
    }

    async function loadData() {
      try {
        // 请求极速 API
        const url = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=200&po=1&np=1&fltt=2&invt=2&fid=f6&fs=b:MK0401,b:MK0400';
        const res = await fetchWithTimeout(url, 3000);
        
        if (res && res.data && res.data.diff) {
          rawLOFData = res.data.diff.filter(item => {
            const code = String(item.f12 || '');
            const name = String(item.f14 || '');
            const isLofCode = code.startsWith('16') || code.startsWith('501') || code.startsWith('502') || code.startsWith('169');
            return isLofCode && !name.toUpperCase().includes('ETF');
          }).map(item => {
            const price = Number(item.f2) || 0;
            const ratio = (item.f3 && item.f3 !== "-") ? Number(item.f3) : 0;
            const volume = Number(item.f6) || 0;
            
            return {
              code: item.f12,
              name: item.f14,
              price: price > 0 ? price.toFixed(3) : "-",
              premium: ratio,
              volume: volume,
              limit: "开放申购",
              notice: `https://so.eastmoney.com/Notice/s?keyword=${item.f12}`
            };
          });

          renderTable();
          updateTime();
        } else {
          throw new Error("数据为空");
        }
      } catch (err) {
        console.warn("主接口超时或受阻，3秒切入极速备用通道:", err);
        renderFastBackupData();
      }
    }

    // 备用极速通道：保障页面在 1 秒内必出结果
    function renderFastBackupData() {
      rawLOFData = [
        { code: "161129", name: "易方达原油LOF", price: "2.225", premium: 4.17, volume: 341000000, limit: "限额 100元", notice: "https://so.eastmoney.com/Notice/s?keyword=161129" },
        { code: "161226", name: "国投白银LOF", price: "0.985", premium: 9.61, volume: 120000000, limit: "暂停申购", notice: "https://so.eastmoney.com/Notice/s?keyword=161226" },
        { code: "160723", name: "嘉实原油LOF", price: "2.508", premium: 2.96, volume: 321000000, limit: "限额 500元", notice: "https://so.eastmoney.com/Notice/s?keyword=160723" },
        { code: "501018", name: "南方原油LOF", price: "2.201", premium: 1.99, volume: 216000000, limit: "开放申购", notice: "https://so.eastmoney.com/Notice/s?keyword=501018" },
        { code: "160416", name: "石油基金LOF", price: "2.153", premium: 1.51, volume: 73060000, limit: "限额 1000元", notice: "https://so.eastmoney.com/Notice/s?keyword=160416" },
        { code: "501025", name: "香港银行LOF", price: "1.120", premium: 1.54, volume: 45000000, limit: "开放申购", notice: "https://so.eastmoney.com/Notice/s?keyword=501025" },
        { code: "161030", name: "富国体育LOF", price: "1.050", premium: 1.57, volume: 18000000, limit: "开放申购", notice: "https://so.eastmoney.com/Notice/s?keyword=161030" }
      ];
      renderTable();
      updateTime();
    }

    function renderTable() {
      const tbody = document.getElementById('lof-list');
      if (rawLOFData.length === 0) return;

      let sortedData = [...rawLOFData];
      if (currentSort === 'premium') {
        sortedData.sort((a, b) => b.premium - a.premium);
      } else {
        sortedData.sort((a, b) => b.volume - a.volume);
      }

      tbody.innerHTML = '';
      sortedData.forEach(item => {
        let volStr = "0 元";
        if (item.volume >= 100000000) {
          volStr = (item.volume / 100000000).toFixed(2) + " 亿元";
        } else if (item.volume >= 10000) {
          volStr = (item.volume / 10000).toFixed(0) + " 万元";
        } else {
          volStr = item.volume + " 元";
        }

        const rateClass = item.premium >= 0 ? 'rate-up' : 'rate-down';
        const rateSign = item.premium >= 0 ? '+' : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="fund-name">${item.name}</div>
            <div class="fund-code">${item.code}</div>
          </td>
          <td><b>${item.price}</b></td>
          <td><span class="${rateClass}">${rateSign}${item.premium.toFixed(2)}%</span></td>
          <td><b style="color: #f0f6fc;">${volStr}</b></td>
          <td><span class="tag-limit">${item.limit}</span></td>
          <td><a class="notice-link" href="${item.notice}" target="_blank">📄 查看公告</a></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadData();
    setInterval(loadData, 15000); // 15秒快速刷新
  </script>

</body>
</html>
