<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | 高流动性 LOF 套利雷达</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 1.1rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .filter-info {
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #161b22;
      border-radius: 6px;
      border-left: 3px solid #388bfd;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.85rem;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } /* 涨/溢价红 */
    .rate-down { color: #3fb950; font-weight: bold; } /* 跌/折价绿 */
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      font-size: 0.7rem;
      border-radius: 4px;
      background: #21262d;
      color: #c9d1d9;
    }
    .loading-text { text-align: center; padding: 20px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📈 ArbRadar v0.1</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span> (北京时间)</div>
  </div>

  <div class="filter-info">
    🛡️ <b>流动性筛选已优化</b>：排除僵尸标的，优先展示<b>昨日或今日成交额 ≥ 100 万元人民币</b>的活跃 LOF。
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>日涨跌幅</th>
          <th>成交额 (人民币)</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="5" class="loading-text">⏳ 正在扫描全市场 LOF 基金...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    // 核心套利 LOF 白名单（确保热门品种开盘即显现）
    const LOF_WHITE_LIST = [
      "161129", "161226", "160723", "501018", "160416", "501025", 
      "161030", "169104", "160638", "165313", "501300", "162411", "164701", "163208"
    ];

    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    async function fetchLOFData() {
      const tbody = document.getElementById('lof-list');
      
      try {
        // 请求全量场内基金（按成交额由高到低排序）
        const url = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=1&np=1&fltt=2&invt=2&fid=f6&fs=b:MK0400';
        const response = await fetch(url);
        const res = await response.json();
        const rawData = (res.data && res.data.diff) ? res.data.diff : [];

        // 核心过滤规则
        const activeLofData = rawData.filter(item => {
          const code = String(item.f12 || '');
          const name = String(item.f14 || '');
          const volume = Number(item.f6) || 0; // 当日实时成交额(元)

          // 1. 判断是否为 LOF
          const isLofCode = code.startsWith('16') || code.startsWith('501') || code.startsWith('502') || code.startsWith('169');
          const isWhiteListed = LOF_WHITE_LIST.includes(code);
          const isNotETF = !name.toUpperCase().includes('ETF');

          const isLOF = (isLofCode || isWhiteListed) && isNotETF;

          // 2. 流动性保障：属于白名单标的（解决开盘初无成交量问题）或者 盘中成交额已达 100 万元人民币
          const passLiquidity = isWhiteListed || volume >= 1000000;

          return isLOF && passLiquidity;
        });

        if (activeLofData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="loading-text">⚠️ 暂无符合条件的活跃 LOF 标的</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        activeLofData.forEach(item => {
          const code = item.f12;
          const name = item.f14;
          const price = (item.f2 && item.f2 !== "-") ? Number(item.f2).toFixed(3) : "-";
          const ratio = (item.f3 && item.f3 !== "-") ? Number(item.f3) : 0;
          const volume = Number(item.f6) || 0;

          // 格式化人民币成交额（万/亿）
          let volumeStr = "0 万";
          if (volume >= 100000000) {
            volumeStr = (volume / 100000000).toFixed(2) + " 亿元";
          } else if (volume > 0) {
            volumeStr = (volume / 10000).toFixed(0) + " 万元";
          } else {
            volumeStr = "盘初挂单中";
          }

          const rateClass = ratio >= 0 ? 'rate-up' : 'rate-down';
          const rateSign = ratio >= 0 ? '+' : '';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="fund-name">${name}</div>
              <div class="fund-code">${code}</div>
            </td>
            <td>${price}</td>
            <td><span class="${rateClass}">${rateSign}${ratio.toFixed(2)}%</span></td>
            <td><b style="color: #f0f6fc;">${volumeStr}</b></td>
            <td><span class="tag">活跃标的</span></td>
          `;
          tbody.appendChild(tr);
        });

        updateTime();

      } catch (error) {
        console.error("数据调取异常:", error);
        tbody.innerHTML = '<tr><td colspan="5" class="loading-text">❌ 数据加载失败，请刷新网页重试</td></tr>';
      }
    }

    fetchLOFData();
    setInterval(fetchLOFData, 30000); // 30秒自动刷新
  </script>

</body>
</html>
