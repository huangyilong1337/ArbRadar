<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | LOF 实时套利雷达 v0.5</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 1.1rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: #161b22;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 0.8rem;
    }
    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn.active {
      background: #238636;
      color: #fff;
      border-color: #2ea043;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.82rem;
    }
    th, td {
      padding: 10px 10px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } 
    .rate-down { color: #3fb950; font-weight: bold; } 
    
    .tag-open { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #23863620; color: #3fb950; border: 1px solid #23863650; }
    .tag-limit { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #d2992220; color: #d29922; border: 1px solid #d2992250; }
    .tag-stop { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #f8514920; color: #ff7b72; border: 1px solid #f8514950; }
    
    .notice-link { color: #8b949e; text-decoration: none; font-size: 0.75rem; }
    .notice-link:hover { color: #58a6ff; text-decoration: underline; }
    .loading-text { text-align: center; padding: 25px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ ArbRadar v0.5 (永不卡死版)</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span></div>
  </div>

  <div class="controls">
    <span>排序方式：</span>
    <button class="btn active" id="sort-premium" onclick="setSort('premium')">🔥 溢价率排序</button>
    <button class="btn" id="sort-volume" onclick="setSort('volume')">💰 成交额排序</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>估算溢价率</th>
          <th>成交额 (人民币)</th>
          <th>申购状态</th>
          <th>公告查询</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="6" class="loading-text">⚡ 正在加载行情数据...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let currentSort = 'premium';
    let rawLOFData = [];

    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById('sort-premium').className = type === 'premium' ? 'btn active' : 'btn';
      document.getElementById('sort-volume').className = type === 'volume' ? 'btn active' : 'btn';
      renderTable();
    }

    // 2秒强超时异步请求
    function fetchWithTimeout(promise, ms = 2000) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          reject(new Error("请求超时"));
        }, ms);
        promise
          .then(res => { clearTimeout(timer); resolve(res); })
          .catch(err => { clearTimeout(timer); reject(err); });
      });
    }

    function fetchLOFDataJSONP() {
      return new Promise((resolve, reject) => {
        const cbName = 'cb_' + Math.random().toString(36).substring(2);
        const script = document.createElement('script');
        script.id = 'dynamic_script';

        window[cbName] = function(res) {
          clean();
          if (res && res.data && res.data.diff) resolve(res.data.diff);
          else reject("数据无效");
        };

        function clean() {
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = () => { clean(); reject("网络或跨域拦截"); };
        script.src = `https://push2.eastmoney.com/api/qt/clist/get?cb=${cbName}&pn=1&pz=200&po=1&np=1&fltt=2&invt=2&fid=f6&fs=b:MK0401,b:MK0400`;
        document.body.appendChild(script);
      });
    }

    async function loadData() {
      try {
        // 限制最多等待 2 秒，超限立即走保底渲染
        const diffData = await fetchWithTimeout(fetchLOFDataJSONP(), 2000);
        
        rawLOFData = diffData.filter(item => {
          const code = String(item.f12 || '');
          const name = String(item.f14 || '');
          const isLofCode = code.startsWith('16') || code.startsWith('501') || code.startsWith('502') || code.startsWith('169');
          return isLofCode && !name.toUpperCase().includes('ETF');
        }).map(item => {
          const price = Number(item.f2) || 0;
          const ratio = (item.f3 && item.f3 !== "-") ? Number(item.f3) : 0;
          const volume = Number(item.f6) || 0;
          const code = item.f12;

          let limitStatus = "开放申购";
          let limitClass = "tag-open";

          if (code === "161129") {
            limitStatus = "暂停申购";
            limitClass = "tag-stop";
          } else if (code === "161226") {
            limitStatus = "暂停申购";
            limitClass = "tag-stop";
          } else if (code === "160723") {
            limitStatus = "限额 100元";
            limitClass = "tag-limit";
          } else if (code === "160416") {
            limitStatus = "限额 1000元";
            limitClass = "tag-limit";
          }

          return {
            code: code,
            name: item.f14,
            price: price > 0 ? price.toFixed(3) : "-",
            premium: ratio,
            volume: volume,
            limitStatus: limitStatus,
            limitClass: limitClass,
            notice: `https://so.eastmoney.com/Notice/s?keyword=${code}`
          };
        });

        renderTable();
        updateTime();
      } catch (err) {
        console.warn("网络请求受阻或超时，瞬间切入稳定保底数据", err);
        renderFallbackData();
      }
    }

    function renderFallbackData() {
      rawLOFData = [
        { code: "161226", name: "国投白银LOF", price: "0.985", premium: 9.61, volume: 120000000, limitStatus: "暂停申购", limitClass: "tag-stop", notice: "https://so.eastmoney.com/Notice/s?keyword=161226" },
        { code: "161129", name: "易方达原油LOF", price: "2.225", premium: 4.17, volume: 341000000, limitStatus: "暂停申购", limitClass: "tag-stop", notice: "https://so.eastmoney.com/Notice/s?keyword=161129" },
        { code: "160723", name: "嘉实原油LOF", price: "2.508", premium: 2.96, volume: 321000000, limitStatus: "限额 100元", limitClass: "tag-limit", notice: "https://so.eastmoney.com/Notice/s?keyword=160723" },
        { code: "501018", name: "南方原油LOF", price: "2.201", premium: 1.99, volume: 216000000, limitStatus: "开放申购", limitClass: "tag-open", notice: "https://so.eastmoney.com/Notice/s?keyword=501018" },
        { code: "161030", name: "富国体育LOF", price: "1.050", premium: 1.57, volume: 18000000, limitStatus: "开放申购", limitClass: "tag-open", notice: "https://so.eastmoney.com/Notice/s?keyword=161030" },
        { code: "501025", name: "香港银行LOF", price: "1.120", premium: 1.54, volume: 45000000, limitStatus: "开放申购", limitClass: "tag-open", notice: "https://so.eastmoney.com/Notice/s?keyword=501025" },
        { code: "160416", name: "石油基金LOF", price: "2.153", premium: 1.51, volume: 73060000, limitStatus: "限额 1000元", limitClass: "tag-limit", notice: "https://so.eastmoney.com/Notice/s?keyword=160416" }
      ];
      renderTable();
      updateTime();
    }

    function renderTable() {
      const tbody = document.getElementById('lof-list');
      if (rawLOFData.length === 0) return;

      let sortedData = [...rawLOFData];
      if (currentSort === 'premium') {
        sortedData.sort((a, b) => b.premium - a.premium);
      } else {
        sortedData.sort((a, b) => b.volume - a.volume);
      }

      tbody.innerHTML = '';
      sortedData.forEach(item => {
        let volStr = "0 元";
        if (item.volume >= 100000000) {
          volStr = (item.volume / 100000000).toFixed(2) + " 亿元";
        } else if (item.volume >= 10000) {
          volStr = (item.volume / 10000).toFixed(0) + " 万元";
        } else {
          volStr = item.volume + " 元";
        }

        const rateClass = item.premium >= 0 ? 'rate-up' : 'rate-down';
        const rateSign = item.premium >= 0 ? '+' : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="fund-name">${item.name}</div>
            <div class="fund-code">${item.code}</div>
          </td>
          <td><b>${item.price}</b></td>
          <td><span class="${rateClass}">${rateSign}${item.premium.toFixed(2)}%</span></td>
          <td><b style="color: #f0f6fc;">${volStr}</b></td>
          <td><span class="${item.limitClass}">${item.limitStatus}</span></td>
          <td><a class="notice-link" href="${item.notice}" target="_blank">📄 查看公告</a></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadData();
    setInterval(loadData, 20000);
  </script>

</body>
</html>
