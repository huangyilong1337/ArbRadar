<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | 全市场 LOF 深度套利雷达</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 1.1rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: #161b22;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 0.8rem;
    }
    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn.active {
      background: #238636;
      color: #fff;
      border-color: #2ea043;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.82rem;
    }
    th, td {
      padding: 10px 10px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } /* 高溢价红 */
    .rate-down { color: #3fb950; font-weight: bold; } /* 折价绿 */
    
    .tag-limit {
      display: inline-block;
      padding: 2px 5px;
      font-size: 0.7rem;
      border-radius: 4px;
      background: #388bfd15;
      color: #58a6ff;
      border: 1px solid #388bfd30;
    }
    .notice-link {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.75rem;
    }
    .notice-link:hover { color: #58a6ff; text-decoration: underline; }
    .loading-text { text-align: center; padding: 25px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📈 ArbRadar v0.2</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span></div>
  </div>

  <div class="controls">
    <span>排序方式：</span>
    <button class="btn active" id="sort-premium" onclick="setSort('premium')">🔥 溢价率由高到低</button>
    <button class="btn" id="sort-volume" onclick="setSort('volume')">💰 成交额由高到低</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>最新净值</th>
          <th>估算溢价率</th>
          <th>昨日成交额</th>
          <th>申购限额</th>
          <th>最新公告</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="7" class="loading-text">⏳ 正在同步全市场 200+ 只 LOF 的净值、溢价率与限购公告...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let currentSort = 'premium'; // 默认按溢价率排序
    let rawLOFData = [];

    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById('sort-premium').className = type === 'premium' ? 'btn active' : 'btn';
      document.getElementById('sort-volume').className = type === 'volume' ? 'btn active' : 'btn';
      renderTable();
    }

    // 采用 Script 注入 JSONP 方式突破跨域封锁，调取天天基金/东方财富全量 LOF 接口
    function fetchLOFDataJSONP() {
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_lof_' + Date.now();
        window[callbackName] = function(res) {
          delete window[callbackName];
          document.body.removeChild(script);
          if (res && res.data && res.data.diff) {
            resolve(res.data.diff);
          } else {
            reject("数据格式异常");
          }
        };

        const script = document.createElement('script');
        // 抓取全市场场内开放式基金（LOF/QDII）全量数据
        script.src = `https://push2.eastmoney.com/api/qt/clist/get?cb=${callbackName}&pn=1&pz=300&po=1&np=1&fltt=2&invt=2&fid=f6&fs=b:MK0401,b:MK0400`;
        script.onerror = () => {
          delete window[callbackName];
          document.body.removeChild(script);
          reject("网络请求失败");
        };
        document.body.appendChild(script);
      });
    }

    async function loadData() {
      try {
        const data = await fetchLOFDataJSONP();
        
        // 过滤并处理全量 LOF 标的
        rawLOFData = data.filter(item => {
          const code = String(item.f12 || '');
          const name = String(item.f14 || '');
          const isLofCode = code.startsWith('16') || code.startsWith('501') || code.startsWith('502') || code.startsWith('169');
          const isNotETF = !name.toUpperCase().includes('ETF');
          return isLofCode && isNotETF;
        }).map(item => {
          const price = Number(item.f2) || 0; // 现价
          const nav = Number(item.f33) || Number(item.f2) || 1; // 单位净值
          // 计算估算溢价率 (%)
          let premium = 0;
          if (item.f3 && item.f3 !== "-") {
            premium = Number(item.f3);
          } else if (price > 0 && nav > 0) {
            premium = ((price - nav) / nav) * 100;
          }
          
          return {
            code: item.f12,
            name: item.f14,
            price: price > 0 ? price.toFixed(3) : "-",
            nav: nav > 0 ? nav.toFixed(4) : "-",
            premium: premium,
            volume: Number(item.f6) || 0, // 昨日/实时成交额
            limit: item.f30 ? item.f30 : "开放申购", // 限购状态
            notice: `https://so.eastmoney.com/Notice/s?keyword=${item.f12}` // 最新公告链接
          };
        });

        renderTable();
        updateTime();
      } catch (err) {
        console.error("JSONP 加载失败，采用全量数据解析", err);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('lof-list');
      if (rawLOFData.length === 0) return;

      // 排序逻辑
      let sortedData = [...rawLOFData];
      if (currentSort === 'premium') {
        sortedData.sort((a, b) => b.premium - a.premium); // 溢价率降序
      } else {
        sortedData.sort((a, b) => b.volume - a.volume); // 成交额降序
      }

      tbody.innerHTML = '';
      sortedData.forEach(item => {
        // 成交额单位换算
        let volStr = "0 元";
        if (item.volume >= 100000000) {
          volStr = (item.volume / 100000000).toFixed(2) + " 亿元";
        } else if (item.volume >= 10000) {
          volStr = (item.volume / 10000).toFixed(0) + " 万元";
        } else {
          volStr = item.volume + " 元";
        }

        const rateClass = item.premium >= 0 ? 'rate-up' : 'rate-down';
        const rateSign = item.premium >= 0 ? '+' : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="fund-name">${item.name}</div>
            <div class="fund-code">${item.code}</div>
          </td>
          <td><b>${item.price}</b></td>
          <td style="color: #8b949e;">${item.nav}</td>
          <td><span class="${rateClass}">${rateSign}${item.premium.toFixed(2)}%</span></td>
          <td><b style="color: #f0f6fc;">${volStr}</b></td>
          <td><span class="tag-limit">${item.limit}</span></td>
          <td><a class="notice-link" href="${item.notice}" target="_blank">📄 查看公告</a></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadData();
    setInterval(loadData, 30000); // 30秒自动更新
  </script>

</body>
</html>
