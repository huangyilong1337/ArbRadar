<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | LOF套利雷达</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>📈 ArbRadar v0.1</h1>
    <div class="time">更新于: <span id="time">10:00:00</span></div>
  </div>

  <div class="card-list">
    <!-- 样例基金卡片 1 -->
    <div class="card">
      <div class="card-header">
        <span>易方达原油LOF <span class="fund-code">(161129)</span></span>
        <span class="tag limit">限购 100元</span>
      </div>
      <div class="metrics">
        <div class="metric-box">
          <span class="label">实时溢价率</span>
          <span class="premium-rate positive">+5.24%</span>
        </div>
        <div class="metric-box" style="text-align: right;">
          <span class="label">成交额</span>
          <span style="font-size: 0.95rem; font-weight: bold;">1,240 万</span>
        </div>
      </div>
      <div class="tags">
        <span class="tag settle">交收: T+3</span>
        <span class="tag">申购状态: 暂停大额</span>
      </div>
      <div class="notice">
        📢 最新公告: 关于暂停大额申购的业务公告 (2026-07-24)
      </div>
    </div>

    <!-- 样例基金卡片 2 -->
    <div class="card">
      <div class="card-header">
        <span>纳斯达克LOF <span class="fund-code">(161130)</span></span>
        <span class="tag limit">限购 1000元</span>
      </div>
      <div class="metrics">
        <div class="metric-box">
          <span class="label">实时溢价率</span>
          <span class="premium-rate positive">+2.18%</span>
        </div>
        <div class="metric-box" style="text-align: right;">
          <span class="label">成交额</span>
          <span style="font-size: 0.95rem; font-weight: bold;">850 万</span>
        </div>
      </div>
      <div class="tags">
        <span class="tag settle">交收: T+2</span>
        <span class="tag">申购状态: 正常</span>
      </div>
      <div class="notice">
        📢 最新公告: 溢价交易风险提示公告
      </div>
    </div>
  </div>

</body>
</html>
