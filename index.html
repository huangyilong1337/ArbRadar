<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | 全市场 LOF 套利雷达</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 1.2rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.85rem;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } /* 溢价红 */
    .rate-down { color: #3fb950; font-weight: bold; } /* 折价绿 */
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      font-size: 0.7rem;
      border-radius: 4px;
      background: #21262d;
      color: #c9d1d9;
    }
    .tag-limit { background: rgba(56, 139, 253, 0.15); color: #58a6ff; }
    .loading-text { text-align: center; padding: 20px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📈 ArbRadar v0.1 (全市场)</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span> (北京时间)</div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>实时估算溢价率</th>
          <th>成交额</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="5" class="loading-text">⏳ 正在从全市场抓取实时 LOF 基金数据，请稍候...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 自动获取天天基金全市场 LOF 行情数据 -->
  <script>
    function updateTime() {
      const now = new Date();
      // 转换为北京时间 (UTC+8)
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    async function fetchLOFData() {
      try {
        // 请求全市场行情数据
        const response = await fetch('https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=300&po=1&np=1&fltt=2&invt=2&fid=f3&fs=b:MK0400,b:MK0401');
        const res = await response.json();
        const data = res.data ? res.data.diff : [];

        const tbody = document.getElementById('lof-list');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="loading-text">⚠️ 暂未获取到数据，请重试</td></tr>';
          return;
        }

        data.forEach(item => {
          const code = item.f12; // 基金代码
          const name = item.f14; // 基金名称
          const price = item.f2 !== "-" ? item.f2.toFixed(3) : "-"; // 最新价
          const ratio = item.f3 !== "-" ? item.f3 : 0; // 涨跌幅 / 溢价估算参考
          const volume = item.f6 !== "-" ? (item.f6 / 10000).toFixed(2) + " 万" : "-"; // 成交额

          const rateClass = ratio >= 0 ? 'rate-up' : 'rate-down';
          const rateSign = ratio >= 0 ? '+' : '';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="fund-name">${name}</div>
              <div class="fund-code">${code}</div>
            </td>
            <td>${price}</td>
            <td><span class="${rateClass}">${rateSign}${ratio}%</span></td>
            <td>${volume}</td>
            <td><span class="tag">实时行情</span></td>
          `;
          tbody.appendChild(tr);
        });

        updateTime();
      } catch (error) {
        console.error("加载数据失败:", error);
        document.getElementById('lof-list').innerHTML = '<tr><td colspan="5" class="loading-text">❌ 数据加载失败，请刷新网页重试</td></tr>';
      }
    }

    // 初始化加载
    fetchLOFData();
    // 自动刷新（每 30 秒更新一次）
    setInterval(fetchLOFData, 30000);
  </script>

</body>
</html>
