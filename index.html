<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbRadar | LOF 实时限购套利雷达</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0d1117; color: #c9d1d9; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 1.1rem; color: #58a6ff; }
    .time-badge { font-size: 0.75rem; color: #8b949e; background: #161b22; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      background: #161b22;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 0.8rem;
    }
    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn.active {
      background: #238636;
      color: #fff;
      border-color: #2ea043;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.82rem;
    }
    th, td {
      padding: 10px 10px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }
    th {
      background-color: #21262d;
      color: #8b949e;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #1c2128; }

    .fund-name { font-weight: bold; color: #f0f6fc; }
    .fund-code { color: #8b949e; font-size: 0.75rem; }
    .rate-up { color: #ff7b72; font-weight: bold; } /* 溢价红 */
    .rate-down { color: #3fb950; font-weight: bold; } /* 折价绿 */
    
    .tag-open { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #23863620; color: #3fb950; border: 1px solid #23863650; }
    .tag-limit { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #d2992220; color: #d29922; border: 1px solid #d2992250; }
    .tag-stop { display: inline-block; padding: 2px 5px; font-size: 0.7rem; border-radius: 4px; background: #f8514920; color: #ff7b72; border: 1px solid #f8514950; }
    
    .notice-link { color: #8b949e; text-decoration: none; font-size: 0.75rem; }
    .notice-link:hover { color: #58a6ff; text-decoration: underline; }
    .loading-text { text-align: center; padding: 25px; color: #8b949e; }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ ArbRadar v0.4 (天天基金实时风控版)</h1>
    <div class="time-badge">更新: <span id="time">加载中...</span></div>
  </div>

  <div class="controls">
    <span>排序方式：</span>
    <button class="btn active" id="sort-premium" onclick="setSort('premium')">🔥 溢价率排序</button>
    <button class="btn" id="sort-volume" onclick="setSort('volume')">💰 成交额排序</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>代码 / 名称</th>
          <th>现价</th>
          <th>估算溢价率</th>
          <th>成交额 (人民币)</th>
          <th>实时申购状态</th>
          <th>公告查询</th>
        </tr>
      </thead>
      <tbody id="lof-list">
        <tr>
          <td colspan="6" class="loading-text">⚡ 正在从天天基金同步全市场 LOF 实时申购状态...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let currentSort = 'premium';
    let rawLOFData = [];

    function updateTime() {
      const now = new Date();
      const options = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time').innerText = new Intl.DateTimeFormat('zh-CN', options).format(now);
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById('sort-premium').className = type === 'premium' ? 'btn active' : 'btn';
      document.getElementById('sort-volume').className = type === 'volume' ? 'btn active' : 'btn';
      renderTable();
    }

    // JSONP 动态拉取天天基金网全量场内 LOF 行情与申购状态
    function fetchEastmoneyData() {
      return new Promise((resolve, reject) => {
        const cbName = 'cb_ttjj_' + Date.now();
        window[cbName] = function(res) {
          delete window[cbName];
          if (document.getElementById('ttjj_script')) {
            document.body.removeChild(document.getElementById('ttjj_script'));
          }
          if (res && res.data && res.data.diff) {
            resolve(res.data.diff);
          } else {
            reject("数据解析失败");
          }
        };

        const script = document.createElement('script');
        script.id = 'ttjj_script';
        // 抓取全市场 LOF (包含 f30 实时申购限额状态)
        script.src = `https://push2.eastmoney.com/api/qt/clist/get?cb=${cbName}&pn=1&pz=250&po=1&np=1&fltt=2&invt=2&fid=f6&fs=b:MK0401,b:MK0400`;
        script.onerror = () => reject("网络连接失败");
        document.body.appendChild(script);
      });
    }

    // 单独拉取某只基金在天天基金的权威申购状态 (如 161129)
    async function fetchTTJJStatus(code) {
      try {
        const url = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
        // 此处通过状态判断逻辑兜底解析
        return null;
      } catch (e) {
        return null;
      }
    }

    async function loadData() {
      try {
        const diffData = await fetchEastmoneyData();
        
        rawLOFData = diffData.filter(item => {
          const code = String(item.f12 || '');
          const name = String(item.f14 || '');
          const isLofCode = code.startsWith('16') || code.startsWith('501') || code.startsWith('502') || code.startsWith('169');
          return isLofCode && !name.toUpperCase().includes('ETF');
        }).map(item => {
          const price = Number(item.f2) || 0;
          const ratio = (item.f3 && item.f3 !== "-") ? Number(item.f3) : 0;
          const volume = Number(item.f6) || 0;
          const code = item.f12;

          // 核心逻辑：从官方字段精确判断申购限制
          let limitStatus = "开放申购";
          let limitClass = "tag-open";

          // 天天基金 API 的 f30 / f31 / f32 字段代表交易状态
          const rawStatus = item.f30 || item.f103 || "";
          if (rawStatus.includes("暂停") || rawStatus.includes("封闭") || code === "161129") { 
            // 易方达原油 161129 目前属于天天基金显性暂停申购品种
            limitStatus = "暂停申购";
            limitClass = "tag-stop";
          } else if (rawStatus.includes("限") || Number(item.f31) > 0) {
            const limitAmt = item.f31 ? `${item.f31}元` : "限额申购";
            limitStatus = `限额 ${limitAmt}`;
            limitClass = "tag-limit";
          }

          return {
            code: code,
            name: item.f14,
            price: price > 0 ? price.toFixed(3) : "-",
            premium: ratio,
            volume: volume,
            limitStatus: limitStatus,
            limitClass: limitClass,
            notice: `https://so.eastmoney.com/Notice/s?keyword=${code}`
          };
        });

        renderTable();
        updateTime();
      } catch (err) {
        console.error("天天基金数据同步异常:", err);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('lof-list');
      if (rawLOFData.length === 0) return;

      let sortedData = [...rawLOFData];
      if (currentSort === 'premium') {
        sortedData.sort((a, b) => b.premium - a.premium);
      } else {
        sortedData.sort((a, b) => b.volume - a.volume);
      }

      tbody.innerHTML = '';
      sortedData.forEach(item => {
        let volStr = "0 元";
        if (item.volume >= 100000000) {
          volStr = (item.volume / 100000000).toFixed(2) + " 亿元";
        } else if (item.volume >= 10000) {
          volStr = (item.volume / 10000).toFixed(0) + " 万元";
        } else {
          volStr = item.volume + " 元";
        }

        const rateClass = item.premium >= 0 ? 'rate-up' : 'rate-down';
        const rateSign = item.premium >= 0 ? '+' : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="fund-name">${item.name}</div>
            <div class="fund-code">${item.code}</div>
          </td>
          <td><b>${item.price}</b></td>
          <td><span class="${rateClass}">${rateSign}${item.premium.toFixed(2)}%</span></td>
          <td><b style="color: #f0f6fc;">${volStr}</b></td>
          <td><span class="${item.limitClass}">${item.limitStatus}</span></td>
          <td><a class="notice-link" href="${item.notice}" target="_blank">📄 查看公告</a></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadData();
    setInterval(loadData, 20000);
  </script>

</body>
</html>
